  <style>
    :root {
      --bg: #0b0b0e;
      --bg-soft: #111116;
      --card: rgba(255,255,255,0.04);
      --card-strong: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.08);
      --text: #f8f7f3;
      --muted: #afafb7;
      --muted-2: #83838d;
      --gold: #e6b15d;
      --gold-2: #f4c87c;
      --success: #22c55e;
      --shadow: 0 22px 80px rgba(0,0,0,0.42);
      --radius: 18px;
      --radius-lg: 28px;
      --container: 1180px;
      --nav-h: 76px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at top right, rgba(230,177,93,0.10), transparent 28%),
        radial-gradient(circle at bottom left, rgba(230,177,93,0.08), transparent 22%),
        var(--bg);
      color: var(--text);
      line-height: 1.65;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .container {
      width: min(var(--container), calc(100% - 2rem));
      margin: 0 auto;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: .7rem;
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: var(--gold);
      font-weight: 700;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: 24px;
      height: 1px;
      background: rgba(230,177,93,0.55);
    }

    .section {
      padding: 6.5rem 0;
      position: relative;
    }

    .section-head {
      max-width: 760px;
      margin: 0 auto 3.2rem;
      text-align: center;
    }

    .section-head h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-top: 1rem;
    }

    .section-head p {
      color: var(--muted);
      font-size: 1.05rem;
      margin-top: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .7rem;
      min-height: 54px;
      padding: 0 1.35rem;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 700;
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease, background .22s ease;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      color: #151515;
      box-shadow: 0 14px 34px rgba(230,177,93,0.24);
    }

    .btn-secondary {
      border-color: var(--line);
      background: rgba(255,255,255,0.02);
      color: var(--text);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: .7rem;
      margin-top: 1.5rem;
    }

    .tag {
      padding: .6rem .9rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: .84rem;
      font-weight: 600;
    }

    .glass {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      height: var(--nav-h);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(11,11,14,0.78);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .nav {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: .85rem;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(230,177,93,0.25), rgba(230,177,93,0.08));
      border: 1px solid rgba(230,177,93,0.25);
      font-weight: 800;
      color: var(--gold-2);
    }

    .brand-copy strong {
      display: block;
      font-size: .97rem;
      letter-spacing: -0.02em;
    }

    .brand-copy span {
      display: block;
      font-size: .78rem;
      color: var(--muted-2);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.3rem;
      list-style: none;
    }

    .nav-links a {
      font-size: .9rem;
      color: var(--muted);
      font-weight: 600;
      transition: color .18s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: .8rem;
    }

    .nav-mobile-toggle {
      display: none;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .hero {
      padding: 4rem 0 5rem;
      min-height: calc(100vh - var(--nav-h));
      display: flex;
      align-items: center;
      position: relative;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(360px, .95fr);
      gap: 3rem;
      align-items: center;
    }

    .hero-copy h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(3.2rem, 7vw, 6.3rem);
      line-height: .94;
      letter-spacing: -0.05em;
      margin: 1.2rem 0 1.2rem;
    }

    .hero-copy h1 span {
      color: var(--gold);
      font-style: italic;
    }

    .hero-copy p {
      max-width: 650px;
      font-size: 1.08rem;
      color: var(--muted);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: .9rem;
      margin-top: 2rem;
    }

    .hero-points {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--line);
    }

    .hero-point strong {
      display: block;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.8rem;
      line-height: 1;
      margin-bottom: .35rem;
    }

    .hero-point span {
      color: var(--muted);
      font-size: .85rem;
      display: block;
    }

    .hero-card {
      position: relative;
      padding: 1rem;
      border-radius: var(--radius-lg);
    }

    .hero-photo {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid rgba(230,177,93,0.18);
      min-height: 620px;
      background:
        linear-gradient(to top, rgba(11,11,14,0.72), rgba(11,11,14,0.08)),
        url('gustavo.png') center/cover no-repeat,
        linear-gradient(135deg, #1b1b20, #0f0f13);
    }

    .hero-photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 20%, rgba(11,11,14,0.72) 100%);
      pointer-events: none;
    }

    .hero-overlay {
      position: absolute;
      inset: auto 1.2rem 1.2rem 1.2rem;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: .8rem;
    }

    .hero-overlay-card {
      border-radius: 18px;
      padding: 1rem 1rem;
      background: rgba(10,10,13,0.7);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .hero-overlay-card strong {
      display: block;
      font-size: .93rem;
      margin-bottom: .25rem;
    }

    .hero-overlay-card span {
      color: var(--muted);
      font-size: .83rem;
    }

    .floating-badge {
      position: absolute;
      z-index: 3;
      padding: .95rem 1rem;
      border-radius: 16px;
      background: rgba(10,10,13,0.8);
      border: 1px solid rgba(230,177,93,0.18);
      box-shadow: 0 20px 50px rgba(0,0,0,0.38);
      min-width: 220px;
    }

    .floating-badge strong {
      display: block;
      font-size: .92rem;
      margin-bottom: .22rem;
    }

    .floating-badge span {
      color: var(--muted);
      font-size: .82rem;
    }

    .floating-badge.top {
      top: -18px;
      right: -18px;
    }

    .floating-badge.bottom {
      bottom: 34px;
      left: -24px;
    }

    .marquee {
      padding: 1.15rem 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.015);
      overflow: hidden;
    }

    .marquee-track {
      display: flex;
      gap: 2rem;
      white-space: nowrap;
      animation: marquee 24s linear infinite;
      min-width: max-content;
      color: rgba(255,255,255,0.45);
      font-size: .88rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .services-grid,
    .proof-grid,
    .plans-grid,
    .faq-grid,
    .audit-grid {
      display: grid;
      gap: 1.25rem;
    }

    .services-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .service-card,
    .proof-card,
    .audit-card {
      border-radius: 24px;
      padding: 1.4rem;
    }

    .service-icon,
    .audit-icon {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      margin-bottom: 1.1rem;
      background: rgba(230,177,93,0.08);
      border: 1px solid rgba(230,177,93,0.18);
      color: var(--gold-2);
      font-weight: 800;
    }

    .service-card h3,
    .audit-card h3,
    .proof-card h3,
    .plan-card h3 {
      font-size: 1.08rem;
      line-height: 1.3;
      margin-bottom: .55rem;
    }

    .service-card p,
    .audit-card p,
    .proof-card p,
    .plan-card p,
    .process-copy p,
    .about-copy p,
    .cta-copy p {
      color: var(--muted);
      font-size: .95rem;
    }

    .about-grid,
    .process-grid,
    .cta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 2rem;
      align-items: center;
    }

    .about-visual,
    .cta-card,
    .process-panel {
      border-radius: var(--radius-lg);
      padding: 1rem;
    }

    .about-photo {
      position: relative;
      min-height: 560px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(230,177,93,0.16);
      background:
        linear-gradient(to top, rgba(11,11,14,0.72), rgba(11,11,14,0.15)),
        url('gustavo.png') center/cover no-repeat,
        linear-gradient(135deg, #1a1a1f, #101014);
    }

    .about-floating {
      position: absolute;
      left: 1rem;
      bottom: 1rem;
      padding: 1rem 1rem;
      border-radius: 18px;
      background: rgba(11,11,14,0.75);
      border: 1px solid rgba(255,255,255,0.08);
      max-width: 260px;
    }

    .about-floating strong {
      display: block;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2rem;
      line-height: 1;
      color: var(--gold);
      margin-bottom: .2rem;
    }

    .proof-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .proof-card {
      min-height: 100%;
    }

    .proof-label {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      font-size: .78rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: .9rem;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .proof-label::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 6px rgba(34,197,94,0.12);
    }

    .proof-result {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--line);
      color: var(--text);
      font-weight: 600;
      font-size: .92rem;
    }

    .process-list {
      display: grid;
      gap: 1rem;
    }

    .process-step {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 1rem;
      align-items: start;
      padding: 1rem 0;
      border-bottom: 1px solid var(--line);
    }

    .process-step:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .process-number {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid rgba(230,177,93,0.22);
      color: var(--gold);
      background: rgba(230,177,93,0.06);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .process-step h3 {
      margin-bottom: .35rem;
      font-size: 1rem;
    }

    .process-panel-card {
      border-radius: 22px;
      padding: 1.3rem;
      min-height: 100%;
    }

    .process-panel-card + .process-panel-card {
      margin-top: 1rem;
    }

    .plan-note {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .5rem .85rem;
      border-radius: 999px;
      border: 1px solid rgba(230,177,93,0.18);
      background: rgba(230,177,93,0.06);
      color: var(--gold-2);
      font-size: .78rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .plans-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: stretch;
    }

    .plan-card {
      border-radius: 28px;
      padding: 1.6rem;
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .plan-card.featured {
      border-color: rgba(230,177,93,0.28);
      transform: translateY(-6px);
      background: linear-gradient(180deg, rgba(230,177,93,0.08), rgba(255,255,255,0.03));
    }

    .plan-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      padding: .45rem .75rem;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      color: #141414;
      font-size: .72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .plan-price {
      display: flex;
      align-items: baseline;
      gap: .35rem;
      margin: .9rem 0 .2rem;
    }

    .plan-price strong {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 3rem;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--gold-2);
    }

    .plan-price span {
      color: var(--muted);
      font-size: .9rem;
      font-weight: 600;
    }

    .plan-list {
      list-style: none;
      display: grid;
      gap: .8rem;
      margin: 1.4rem 0 1.6rem;
      flex: 1;
    }

    .plan-list li {
      display: flex;
      align-items: flex-start;
      gap: .7rem;
      font-size: .92rem;
      color: var(--muted);
    }

    .plan-list li::before {
      content: "✓";
      flex: 0 0 auto;
      color: var(--gold);
      font-weight: 900;
      margin-top: .02rem;
    }

    .audit-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .faq-wrap {
      max-width: 920px;
      margin: 0 auto;
      display: grid;
      gap: 1rem;
    }

    .faq-item {
      border-radius: 22px;
      overflow: hidden;
    }

    .faq-button {
      width: 100%;
      text-align: left;
      background: transparent;
      border: 0;
      color: var(--text);
      padding: 1.25rem 1.35rem;
